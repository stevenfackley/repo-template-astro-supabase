name: Ops incident
description: Production incident or outage.
labels: [ops, incident]
body:
  - type: input
    id: detected
    attributes: { label: Detected at (UTC) }
    validations: { required: true }
  - type: textarea
    id: impact
    attributes: { label: Impact }
    validations: { required: true }
  - type: textarea
    id: actions
    attributes: { label: Actions taken }
  - type: textarea
    id: postmortem
    attributes: { label: Postmortem link (once written) }
