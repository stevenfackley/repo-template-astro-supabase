services:
  app:
    build: .
    image: ${IMAGE_REF:-ghcr.io/stevenfackley/{{PROJECT_NAME}}:dev}
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/postgres
      NODE_ENV: ${NODE_ENV:-production}
      PORT: "4321"
      # R2 (S3-compatible). In dev, point at the minio service below.
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: auto
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-app-local}
      S3_FORCE_PATH_STYLE: "true"
    ports: ["4321:4321"]
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  db:
    # supabase/postgres ships pgcrypto, pgsodium, pg_graphql, pg_stat_statements,
    # pgjwt, pgvector, etc. Matches Supabase Cloud's schema capabilities.
    image: supabase/postgres:15.8.1.060
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio:
    # Local S3-compatible storage that mirrors R2's API surface.
    # Prod swaps S3_ENDPOINT to https://<account>.r2.cloudflarestorage.com.
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # One-shot job: create the local bucket on first boot.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/app-local &&
        mc anonymous set download local/app-local || true
      "
    restart: "no"

volumes:
  pgdata:
  miniodata:
